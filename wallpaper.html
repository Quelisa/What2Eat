<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃啥？壁纸版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            color: #3a2e20;
            overflow: hidden;          /* 永不出现滚动条 */
        }

        .glass-card {
            background: #fffaf5;
            border-radius: 28px;
            padding: 36px 40px;
            margin: 16px;
            text-align: center;
            filter: drop-shadow(0 3px 14px rgba(0, 0, 0, 0.10));
            border: 1px solid rgba(200, 170, 140, 0.3);
            position: relative;
        }

        /* 顶部拖拽条提示（与 init.lua 里的 DRAG_BAR_H = 36 对应） */
        .drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
        }
        .drag-handle::before {
            content: "";
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: rgba(180, 140, 100, 0.35);
        }
        .drag-handle:hover::before {
            background: rgba(180, 140, 100, 0.6);
        }

        .clock {
            font-size: 2.8rem;
            font-weight: 300;
            color: #3a2e20;
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        .date {
            font-size: 0.9rem;
            color: #6a5a4a;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #c25e24;
            margin-bottom: 6px;
            letter-spacing: 3px;
        }

        .header p {
            color: #7a6a5a;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .selector-group {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .selector label {
            font-size: 0.75rem;
            color: #a09080;
            font-weight: 500;
        }

        .stepper {
            display: flex;
            width: 110px;
            height: 44px;
            background: #fff;
            border: 1px solid #d4c4b4;
            border-radius: 10px;
            overflow: hidden;
            user-select: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .stepper-value {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #3a2e20;
        }

        .stepper-slider {
            width: 22px;
            position: relative;
            cursor: pointer;
            border-left: 1px solid rgba(212, 180, 150, 0.3);
        }

        .stepper-slider::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: rgba(212, 180, 150, 0.5);
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .stepper-thumb {
            position: absolute;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #d4763a;
            border-radius: 50%;
            transform: translateX(-50%);
            transition: top 0.2s;
            box-shadow: 0 1px 3px rgba(212, 118, 58, 0.3);
        }

        .main-btn {
            position: relative;
            z-index: 10;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: none;
            background: #d4763a;
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212, 118, 58, 0.3);
            transition: all 0.2s ease;
            margin-bottom: 28px;
            letter-spacing: 3px;
        }

        .main-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 28px rgba(212, 118, 58, 0.4);
        }

        .main-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .main-btn.shaking {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(5deg); }
        }

        .result-card {
            background: #fff;
            border-radius: 18px;
            padding: 24px 28px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .result-dish {
            font-size: 1.7rem;
            font-weight: 800;
            color: #c25e24;
            margin-bottom: 10px;
        }

        .result-divider {
            width: 40px;
            height: 2px;
            background: rgba(212, 180, 150, 0.5);
            border-radius: 1px;
            margin: 0 auto 10px;
        }

        .result-text {
            font-size: 0.95rem;
            color: #5a4a3a;
            line-height: 1.7;
            font-weight: 500;
        }

        .meal-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .meal-tag.lunch {
            background: #ffe8c8;
            color: #a04000;
        }

        .meal-tag.dinner {
            background: #ffd8e4;
            color: #900040;
        }

        .footer {
            margin-top: 20px;
            color: #8a7a6a;
            font-size: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="drag-handle" title="拖动这里移动挂件"></div>
        <div class="clock" id="clock">12:00</div>
        <div class="date" id="date">1月1日 周一</div>

        <div class="header">
            <h1>今天吃啥？</h1>
            <p>让每一餐都值得期待</p>
        </div>

        <div class="selector-group">
            <div class="selector">
                <label>星期</label>
                <div class="stepper" id="weekday-stepper">
                    <div class="stepper-value" id="weekday-value">周一</div>
                    <div class="stepper-slider" id="weekday-slider" onclick="handleSliderClick(event, 'weekday')">
                        <div class="stepper-thumb" id="weekday-thumb"></div>
                    </div>
                </div>
            </div>
            <div class="selector">
                <label>餐次</label>
                <div class="stepper" id="meal-stepper">
                    <div class="stepper-value" id="meal-value">中餐</div>
                    <div class="stepper-slider" id="meal-slider" onclick="handleSliderClick(event, 'meal')">
                        <div class="stepper-thumb" id="meal-thumb"></div>
                    </div>
                </div>
            </div>
        </div>

        <button class="main-btn" id="btn">吃啥</button>

        <div class="result-card" id="result">
            <div class="meal-tag" id="tag"></div>
            <div class="result-dish" id="dish"></div>
            <div class="result-divider"></div>
            <div class="result-text" id="text"></div>
        </div>

        <div class="footer">好好吃饭，认真生活</div>
    </div>

    <script>
        const dishes = [
            {
                name: "烧鸭",
                quotes: [
                    "滋滋冒油的烧鸭，皮脆肉嫩，配上一碗白饭，今天也要好好犒劳自己呀～",
                    "金黄油亮的鸭皮，一口咬下去满嘴香，周一的疲惫都被治愈了！"
                ]
            },
            {
                name: "瓦罐汤",
                quotes: [
                    "慢火细炖的瓦罐汤，暖胃又暖心，忙碌的日子也要记得喝汤哦～",
                    "一罐好汤，是时间给的小礼物。今天对自己温柔一点吧～"
                ]
            },
            {
                name: "喜家德",
                quotes: [
                    "皮薄馅大的饺子，一口一个幸福，今天的好运气从这一口开始～",
                    "饺子要吃烫烫的，日子要过暖暖的，这一盘是今日份的小确幸！"
                ]
            },
            {
                name: "老乡鸡",
                quotes: [
                    "家常的味道最治愈，就像妈妈做的菜，简单却满是温暖～",
                    "一碗热饭几样小菜，平凡的日子也有满满的幸福感～"
                ]
            },
            {
                name: "麦当劳",
                quotes: [
                    "偶尔也要来点快乐肥宅餐！汉堡薯条配可乐，烦恼统统抛脑后～",
                    "今天允许自己做个小朋友，快乐就是最大的正义！"
                ]
            },
            {
                name: "自选菜",
                quotes: [
                    "今天的选择权交给你，想吃什么拿什么，自由自在最舒服～",
                    "琳琅满目的自选菜，每一种都是不同的惊喜，去发现你的最爱吧！"
                ]
            },
            {
                name: "酱骨",
                quotes: [
                    "大口吃肉的快乐谁能懂？酱香四溢，啃完骨头记得舔舔手指～",
                    "啃骨头的快乐是纯粹的，放下手机，专心享受这一顿吧！"
                ]
            },
            {
                name: "跷脚牛肉",
                quotes: [
                    "牛肉鲜嫩，汤底清香，跷着脚吃才够味，放松一下吧～",
                    "一口鲜汤下肚，整个人都舒坦了，今天也要给自己充充电～"
                ]
            },
            {
                name: "寿喜锅",
                quotes: [
                    "咕嘟咕嘟冒着泡的寿喜锅，牛肉蘸上蛋液一口滑进胃里，温暖从舌尖漫到心底～",
                    "蔬菜、豆腐、肥牛在甜香汤底里翻滚，这一锅是冬日里的小太阳～"
                ]
            },
            {
                name: "云南生烫米线",
                quotes: [
                    "热腾腾的米线滑溜溜，生烫的鲜嫩配上酸辣的汤底，这才是生活的烟火气～",
                    "一碗米线，是云南的风也是你的餐桌，嗦粉的快感谁能拒绝！"
                ]
            },
            {
                name: "轻食",
                quotes: [
                    "清爽不油腻，给身体放个假，轻盈的一餐也能带来满满的能量～",
                    "蔬菜、水果、优质蛋白，简单搭配却营养满分，健康生活从今天开始！"
                ]
            }
        ];

        const weekdayOptions = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        const mealOptions = ['中餐', '晚餐'];
        let weekdayIndex = 0;
        let mealIndex = 0;

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;

            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('date').textContent = months[now.getMonth()] + now.getDate() + '日 ' + weekdays[now.getDay()];
        }

        setInterval(updateClock, 1000);
        updateClock();

        function updateThumb(type) {
            const options = type === 'weekday' ? weekdayOptions : mealOptions;
            const index = type === 'weekday' ? weekdayIndex : mealIndex;
            const thumb = document.getElementById(type + '-thumb');
            const slider = document.getElementById(type + '-slider');
            const trackHeight = slider.clientHeight - 16;
            const segments = Math.max(options.length - 1, 1);
            const top = 8 + (trackHeight * index / segments);
            thumb.style.top = top + 'px';
        }

        function step(type, dir) {
            if (type === 'weekday') {
                weekdayIndex = (weekdayIndex + dir + weekdayOptions.length) % weekdayOptions.length;
                document.getElementById('weekday-value').textContent = weekdayOptions[weekdayIndex];
                updateThumb('weekday');
            } else {
                mealIndex = (mealIndex + dir + mealOptions.length) % mealOptions.length;
                document.getElementById('meal-value').textContent = mealOptions[mealIndex];
                updateThumb('meal');
            }
        }

        function handleSliderClick(e, type) {
            const slider = e.currentTarget;
            const rect = slider.getBoundingClientRect();
            const y = e.clientY - rect.top;
            step(type, y < rect.height / 2 ? -1 : 1);
        }

        function initDrag(type) {
            const thumb = document.getElementById(type + '-thumb');
            const slider = document.getElementById(type + '-slider');
            const options = type === 'weekday' ? weekdayOptions : mealOptions;

            let dragging = false;

            thumb.addEventListener('mousedown', (e) => {
                dragging = true;
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const rect = slider.getBoundingClientRect();
                const y = e.clientY - rect.top - 8;
                const trackHeight = rect.height - 16;
                let ratio = y / trackHeight;
                ratio = Math.max(0, Math.min(1, ratio));
                const index = Math.round(ratio * (options.length - 1 || 1));
                if (type === 'weekday') weekdayIndex = index;
                else mealIndex = index;
                document.getElementById(type + '-value').textContent = options[index];
                updateThumb(type);
            });

            document.addEventListener('mouseup', () => dragging = false);
        }

        function pick() {
            const btn = document.getElementById('btn');
            const result = document.getElementById('result');
            const dishEl = document.getElementById('dish');
            const textEl = document.getElementById('text');
            const tagEl = document.getElementById('tag');
            const meal = mealOptions[mealIndex];
            const weekday = weekdayOptions[weekdayIndex];

            const available = dishes.filter(d => {
                if (d.name === '麦当劳') return weekday === '周五' && meal === '晚餐';
                if (d.name === '老乡鸡') return meal === '晚餐';
                return true;
            });

            if (available.length === 0) {
                tagEl.textContent = weekday + ' · ' + meal;
                tagEl.className = 'meal-tag ' + (meal === '中餐' ? 'lunch' : 'dinner');
                dishEl.textContent = '今天换个口味吧';
                textEl.textContent = '这个时间没有特别推荐的限定菜品，手动调整一下时间再试试～';
                result.classList.add('show');
                return;
            }

            const dish = available[Math.floor(Math.random() * available.length)];
            const quote = dish.quotes[Math.floor(Math.random() * dish.quotes.length)];

            tagEl.textContent = weekday + ' · ' + meal;
            tagEl.className = 'meal-tag ' + (meal === '中餐' ? 'lunch' : 'dinner');
            dishEl.textContent = dish.name;
            textEl.textContent = quote;

            result.classList.add('show');
        }

        function autoDetect() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();

            const dayMap = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const targetDay = dayMap[day];
            const targetMeal = (hour >= 10 && hour < 15) ? '中餐' : '晚餐';

            weekdayIndex = weekdayOptions.indexOf(targetDay);
            mealIndex = mealOptions.indexOf(targetMeal);

            document.getElementById('weekday-value').textContent = weekdayOptions[weekdayIndex];
            document.getElementById('meal-value').textContent = mealOptions[mealIndex];
            updateThumb('weekday');
            updateThumb('meal');
        }

        initDrag('weekday');
        initDrag('meal');
        document.getElementById('btn').addEventListener('click', pick);
        autoDetect();
        setTimeout(pick, 600);

        // 拖拽条 → 通知 Hammerspoon 启动窗口拖动
        (function () {
            const handle = document.querySelector('.drag-handle');
            if (!handle) return;
            handle.addEventListener('mousedown', function (e) {
                e.preventDefault();
                try {
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.hsbridge) {
                        window.webkit.messageHandlers.hsbridge.postMessage('drag-start');
                    }
                } catch (err) {}
            });
        })();

        // 把内容真实高度报告给 Hammerspoon，让窗口自适应不再出现滚动
        (function () {
            function reportHeight() {
                try {
                    const card = document.querySelector('.glass-card');
                    if (!card || !window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.hsbridge) return;
                    const rect = card.getBoundingClientRect();
                    // 卡片高度 + 上下 margin (16*2)
                    const h = Math.ceil(rect.height + 32);
                    window.webkit.messageHandlers.hsbridge.postMessage({ type: 'resize', height: h });
                } catch (err) {}
            }
            // 首次 + 内容变化时上报
            window.addEventListener('load', () => setTimeout(reportHeight, 50));
            new ResizeObserver(reportHeight).observe(document.querySelector('.glass-card'));
        })();
    </script>
</body>
</html>
